<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Lesson Builder</title>

<style>
body{font-family:system-ui;background:#f8fafc;margin:0;}
.container{max-width:900px;margin:40px auto;background:white;padding:24px;border-radius:16px;}

.section-builder{background:#f1f5f9;padding:12px;margin:12px 0;border-radius:10px;}
.section-active{outline:2px solid #4f46e5;}

.field-instruction{
  font-size:13px;
  color:#555;
  margin-top:10px;
}

textarea,input{width:100%;padding:6px;margin-top:4px;}

button{
  padding:8px 12px;margin:4px;border:none;border-radius:6px;
  background:#4f46e5;color:white;cursor:pointer;
}

/* ✅ VIDEO FIX */
video, iframe, #player, #builderPlayer{
  width:100%;
  height:400px;
  max-width:100%;
  display:block;
}

/* ✅ TEXT LAYER */
#text{
  font-size:18px;
  line-height:2;
  margin-top:20px;
}

/* ✅ FINAL GAP FIX */
.gap-wrap{
  display:inline-block;
  vertical-align:middle;
  margin:0 6px;
}

.gap-input{
  width:140px;
  height:28px;
  border:none;
  border-bottom:2px solid #4f46e5;
  font-size:16px;
  text-align:center;
  outline:none;
  background:white;
}

.gap-input:focus{
  border-bottom:2px solid #10b981;
}

.correct{border-bottom:2px solid green;}
.incorrect{border-bottom:2px solid red;}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>
const app=document.getElementById("app");

let builderPlayer=null, ytPlayer=null, ytReady=false;
let lessonCache=null, currentSection=0, stopTimer=null;
let answersMap={}, checked=false;

/* ---------- YT ---------- */
function loadYT(cb){
  if(window.YT && YT.Player){ cb(); }
  else{
    const tag=document.createElement("script");
    tag.src="https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);
    window.onYouTubeIframeAPIReady=cb;
  }
}
function getYTid(url){
  const m=url.match(/(?:v=|youtu\.be\/|embed\/)([^&?]+)/);
  return m?m[1]:null;
}

/* ---------- ROUTING ---------- */
const params=new URLSearchParams(location.search);
const raw=params.get("data");

if(raw){ loadStudent(JSON.parse(decodeURIComponent(raw))); }
else{ loadBuilder(); }

/* ---------- BUILDER ---------- */
function loadBuilder(saved){
  lessonCache=saved||null;

  app.innerHTML=`
    <h2>🎧 Lesson Builder</h2>

    <div class="field-instruction">Enter a YouTube or MP4 video link.</div>
    <input id="videoUrl">

    <div id="builderVideo"></div>

    <div id="sections"></div>

    <button onclick="addSection()">+ Add Section</button>
    <button onclick="preview()">Preview</button>
    <button onclick="generate()">Generate Link</button>

    <p id="link"></p>
  `;

  document.getElementById("videoUrl").addEventListener("change",loadVideo);

  if(saved){
    document.getElementById("videoUrl").value=saved.videoUrl;
    loadVideo();
    saved.sections.forEach(s=>addSection(s));
  } else addSection();
}

function loadVideo(){
  const url=document.getElementById("videoUrl").value;
  const box=document.getElementById("builderVideo");

  ytReady=false;

  if(url.includes("youtube")){
    box.innerHTML=`<div id="builderPlayer"></div>`;
    loadYT(()=>builderPlayer=new YT.Player("builderPlayer",{videoId:getYTid(url),events:{onReady:()=>ytReady=true}}));
  } else {
    box.innerHTML=`<video id="builderPlayer" controls><source src="${url}"></video>`;
    builderPlayer=document.getElementById("builderPlayer");
    ytReady=true;
  }
}

function getTime(){
  if(!builderPlayer||!ytReady) return 0;
  return builderPlayer.currentTime!==undefined ? builderPlayer.currentTime : builderPlayer.getCurrentTime();
}

function addSection(data={}){
  const div=document.createElement("div");
  div.className="section-builder";

  div.innerHTML=`
    <div class="field-instruction">Enter text. Use ___ for gaps.</div>
    <textarea class="text">${data.text||""}</textarea>

    <div class="field-instruction">Answers (comma separated)</div>
    <input class="answers" value="${(data.answers||[]).join(",")}">

    <div class="field-instruction">Start time</div>
    <input class="start" value="${data.start||0}">
    <button onclick="setStart(this)">Set Start</button>

    <div class="field-instruction">End time</div>
    <input class="end" value="${data.end||0}">
    <button onclick="setEnd(this)">Set End</button>
  `;
  document.getElementById("sections").appendChild(div);
}

function setStart(btn){ btn.parentElement.querySelector(".start").value=Math.floor(getTime()); }
function setEnd(btn){ btn.parentElement.querySelector(".end").value=Math.floor(getTime()); }

function collect(){
  return{
    videoUrl:document.getElementById("videoUrl").value,
    sections:[...document.querySelectorAll(".section-builder")].map(s=>({
      text:s.querySelector(".text").value,
      answers:s.querySelector(".answers").value.split(",").map(a=>a.trim()),
      start:+s.querySelector(".start").value,
      end:+s.querySelector(".end").value
    }))
  };
}

function preview(){ loadStudent(collect(),true); }

function generate(){
  const data=encodeURIComponent(JSON.stringify(collect()));
  const link=`${location.origin}${location.pathname}?data=${data}`;
  document.getElementById("link").innerHTML=
    `<b>Lesson Link:</b><br><a href="${link}" target="_blank">${link}</a>`;
}

/* ---------- STUDENT ---------- */
function loadStudent(data,preview){
  lessonCache=data;
  answersMap={}; checked=false;

  app.innerHTML=`
    ${preview?'<button onclick="loadBuilder(lessonCache)">⬅ Back</button>':""}
    <h2>🎧 Listening Lesson</h2>

    ${data.videoUrl.includes("youtube")?'<div id="player"></div>':`<video id="video" controls><source src="${data.videoUrl}"></video>`}

    <div id="buttons"></div>
    <div id="text"></div>

    <button onclick="checkAnswers()">Check Answers</button>
    <button id="revealBtn" disabled onclick="reveal()">Reveal Answers</button>
    <button onclick="repeat()">Repeat Section</button>

    <p id="result"></p>
  `;

  if(data.videoUrl.includes("youtube")){
    loadYT(()=>ytPlayer=new YT.Player("player",{videoId:getYTid(data.videoUrl)}));
  }

  renderButtons(data);
  renderText(data);
}

function renderButtons(data){
  const box=document.getElementById("buttons");
  data.sections.forEach((_,i)=>{
    const b=document.createElement("button");
    b.textContent="Section "+(i+1);
    b.onclick=()=>play(i,data);
    box.appendChild(b);
  });
}

function play(i,data){
  currentSection=i;
  document.querySelectorAll("#text > div").forEach((d,idx)=>d.classList.toggle("section-active",idx===i));

  const sec=data.sections[i];

  if(ytPlayer){
    ytPlayer.seekTo(sec.start,true);
    ytPlayer.playVideo();
    clearInterval(stopTimer);
    stopTimer=setInterval(()=>{
      if(ytPlayer.getCurrentTime()>=sec.end){ytPlayer.pauseVideo();clearInterval(stopTimer);}
    },200);
  }else{
    const v=document.getElementById("video");
    v.currentTime=sec.start;
    v.play();
    clearInterval(stopTimer);
    stopTimer=setInterval(()=>{
      if(v.currentTime>=sec.end){v.pause();clearInterval(stopTimer);}
    },200);
  }
}

function repeat(){ play(currentSection, lessonCache); }

/* ---------- FINAL INPUT FIX (UPDATED) ---------- */
function renderText(data){
  const container=document.getElementById("text");
  container.innerHTML="";

  data.sections.forEach((sec,si)=>{
    const div=document.createElement("div");
    const parts=sec.text.split("___");

    parts.forEach((p,i)=>{
      div.appendChild(document.createTextNode(p));

      if(i<parts.length-1){
        const wrap=document.createElement("span");
        wrap.className="gap-wrap";

        const input=document.createElement("input");
        input.type="text";
        input.className="gap-input";

        /* ✅ FIX: force input usability */
        input.disabled = false;
        input.readOnly = false;
        input.style.pointerEvents = "auto";

        const id=`q${si}_${i}`;
        input.id=id;
        answersMap[id]=sec.answers[i]||"";

        wrap.appendChild(input);
        div.appendChild(wrap);
      }
    });

    container.appendChild(div);
  });

  /* ✅ FIX: re-enable after render (preview mode fix) */
  setTimeout(()=>{
    document.querySelectorAll(".gap-input").forEach(i=>{
      i.disabled = false;
      i.readOnly = false;
      i.style.pointerEvents = "auto";
    });
  },0);
}

/* ---------- CHECK ---------- */
function checkAnswers(){
  let score=0, attempted=false;

  Object.keys(answersMap).forEach(id=>{
    const el=document.getElementById(id);
    if(el.value.trim()!=="") attempted=true;

    const correct=answersMap[id].toLowerCase();
    const user=el.value.toLowerCase();

    if(user===correct){
      el.classList.add("correct");
      score++;
    }else{
      el.classList.add("incorrect");
    }
  });

  document.getElementById("result").innerText=`Score: ${score}/${Object.keys(answersMap).length}`;
  if(attempted) document.getElementById("revealBtn").disabled=false;
}

function reveal(){
  Object.keys(answersMap).forEach(id=>{
    document.getElementById(id).value=answersMap[id];
  });
}
</script>
</body>
</html>
